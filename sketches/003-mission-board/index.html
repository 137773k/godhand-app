<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>上帝之手 - 游戏任务看板</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #0d0f13;
    color: #fff;
    display: flex; justify-content: center;
    line-height: 1.4; -webkit-font-smoothing: antialiased;
  }
  .phone {
    width: 390px; min-height: 844px;
    background: #0d0f13;
    position: relative; overflow-x: hidden;
  }

  /* Top aura */
  .aura {
    position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(123,97,255,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Header */
  .top-bar {
    padding: 50px 18px 0;
    display: flex; justify-content: space-between; align-items: center;
    position: relative; z-index: 1;
  }
  .app-logo {
    display: flex; align-items: center; gap: 8px;
  }
  .app-logo .hand-icon {
    width: 32px; height: 32px; background: linear-gradient(135deg, #7b61ff, #a78bfa);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .app-logo span { font-size: 18px; font-weight: 700; }
  .top-actions { display: flex; gap: 8px; align-items: center; }
  .notif-btn {
    width: 34px; height: 34px; background: #1a1d27; border-radius: 10px;
    border: none; color: #8e94a0; font-size: 16px; cursor: pointer;
  }
  .level-pill {
    background: linear-gradient(135deg, #7b61ff, #a78bfa);
    padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 700;
  }

  /* Hero Banner */
  .hero-banner {
    margin: 12px 14px 0; position: relative; z-index: 1;
    background: linear-gradient(135deg, #1e1b4b 0%, #1a1d27 60%, #1e1b4b 100%);
    border-radius: 20px; padding: 16px 16px 12px;
    border: 1px solid rgba(123,97,255,0.2);
    overflow: hidden;
  }
  .hero-banner::after {
    content: ''; position: absolute; right: -20px; bottom: -20px;
    width: 140px; height: 140px;
    background: radial-gradient(circle, rgba(123,97,255,0.1) 0%, transparent 70%);
    border-radius: 50%;
  }
  .hero-streak {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(255,215,0,0.15); color: #ffd700;
    padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 600;
    margin-bottom: 8px;
  }
  .hero-title { font-size: 20px; font-weight: 700; position: relative; z-index: 1; }
  .hero-sub { font-size: 12px; color: #8e94a0; margin-top: 2px; position: relative; z-index: 1; }

  /* XP Progress */
  .xp-row {
    margin-top: 10px; position: relative; z-index: 1;
    display: flex; align-items: center; gap: 10px;
  }
  .xp-track {
    flex: 1; height: 6px; background: rgba(255,255,255,0.08);
    border-radius: 3px; overflow: hidden;
  }
  .xp-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, #7b61ff, #a78bfa, #ffd700);
    background-size: 200% 100%; animation: xp-shimmer 2s ease-in-out infinite;
    width: 68%;
  }
  @keyframes xp-shimmer {
    0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; }
  }
  .xp-text { font-size: 11px; color: #8e94a0; white-space: nowrap; }
  .xp-text strong { color: #ffd700; }

  /* Stat Spheres */
  .stat-spheres {
    display: flex; gap: 8px; padding: 12px 14px 0;
    position: relative; z-index: 1;
  }
  .sphere-card {
    flex: 1; background: #1a1d27; border-radius: 16px;
    padding: 12px 8px; text-align: center;
    position: relative; overflow: hidden;
  }
  .sphere-card::after {
    content: ''; position: absolute; top: 0; left: 30%; right: 30%;
    height: 2px; background: linear-gradient(90deg, transparent, rgba(123,97,255,0.3), transparent);
  }
  .sphere-value {
    font-size: 24px; font-weight: 700; letter-spacing: -0.5px;
  }
  .sphere-value.purple { color: #a78bfa; }
  .sphere-value.cyan { color: #00d4ff; }
  .sphere-value.amber { color: #ffd700; }
  .sphere-label { font-size: 10px; color: #6b7280; margin-top: 2px; }
  .sphere-delta { font-size: 10px; margin-top: 4px; }
  .sphere-delta.good { color: #00d4ff; }
  .sphere-delta.warn { color: #ffd700; }

  /* Quest Section */
  .quest-header {
    padding: 16px 18px 8px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .quest-header h3 { font-size: 15px; font-weight: 600; }
  .quest-header .filter { font-size: 11px; color: #7b61ff; cursor: pointer; }

  /* Quest Cards */
  .quest-list { padding: 0 14px; }
  .quest-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px; margin-bottom: 6px;
    background: #1a1d27; border-radius: 14px;
    cursor: pointer; transition: 0.2s;
  }
  .quest-item:hover { background: #22283a; }
  .quest-rank {
    width: 40px; height: 40px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .rank-s { background: linear-gradient(135deg, #ffd700, #ff6b35); }
  .rank-a { background: linear-gradient(135deg, #7b61ff, #a78bfa); }
  .rank-b { background: linear-gradient(135deg, #00d4ff, #00ff88); }
  .rank-c { background: rgba(255,255,255,0.08); }
  .quest-body { flex: 1; }
  .quest-name { font-size: 13px; font-weight: 600; }
  .quest-desc { font-size: 11px; color: #6b7280; margin-top: 1px; }
  .quest-reward {
    text-align: right; flex-shrink: 0;
  }
  .qr-xp { font-size: 13px; font-weight: 700; color: #ffd700; }
  .qr-label { font-size: 9px; color: #546e7a; }

  /* Quick Access */
  .quick-split {
    display: flex; gap: 8px; padding: 8px 14px 8px;
  }
  .split-btn {
    flex: 1; background: #1a1d27; border-radius: 14px;
    padding: 14px; text-align: center; cursor: pointer;
    transition: 0.2s; border: none; color: #fff;
  }
  .split-btn:hover { background: #22283a; }
  .split-btn .sb-icon { font-size: 22px; display: block; margin-bottom: 4px; }
  .split-btn .sb-label { font-size: 12px; font-weight: 600; }
  .split-btn .sb-sub { font-size: 10px; color: #6b7280; margin-top: 2px; }

  /* Bottom Nav */
  .bottom-nav {
    display: flex; justify-content: space-around;
    padding: 10px 8px 18px;
    border-top: 1px solid #1a1d27;
    margin-top: 4px;
  }
  .nav-tab {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    background: none; border: none; color: #546e7a; cursor: pointer;
    font-size: 10px; transition: 0.2s;
  }
  .nav-tab .nt-icon { font-size: 18px; }
  .nav-tab.active { color: #7b61ff; }
  .nav-tab.center .nt-icon {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, #7b61ff, #a78bfa);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: #fff; margin-top: -14px;
    box-shadow: 0 4px 16px rgba(123,97,255,0.4);
  }
</style>
</head>
<body>
<div class="phone">
  <div class="aura"></div>

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="app-logo">
      <div class="hand-icon">✋</div>
      <span>上帝之手</span>
    </div>
    <div class="top-actions">
      <button class="notif-btn">🔔</button>
      <div class="level-pill">Lv.12</div>
    </div>
  </div>

  <!-- Hero / Streak Banner -->
  <div class="hero-banner">
    <div class="hero-streak">🔥 连续 7 天燃烧</div>
    <div class="hero-title">早上好，战士</div>
    <div class="hero-sub">距离精瘦型目标还有 3.5kg · 胜利在望</div>
    <div class="xp-row">
      <div class="xp-track"><div class="xp-fill"></div></div>
      <div class="xp-text"><strong>680</strong> / 1000 XP</div>
    </div>
  </div>

  <!-- Stat Spheres -->
  <div class="stat-spheres">
    <div class="sphere-card">
      <div class="sphere-value purple">78.5</div>
      <div class="sphere-label">体重 kg</div>
      <div class="sphere-delta good">↓ 0.5 本周</div>
    </div>
    <div class="sphere-card">
      <div class="sphere-value cyan">18.2</div>
      <div class="sphere-label">体脂率 %</div>
      <div class="sphere-delta good">↓ 0.8 本周</div>
    </div>
    <div class="sphere-card">
      <div class="sphere-value amber">34.1</div>
      <div class="sphere-label">肌肉量 kg</div>
      <div class="sphere-delta warn">↑ 0.3 本周</div>
    </div>
  </div>

  <!-- Quest (Today's Tasks) -->
  <div class="quest-header">
    <h3>⚔️ 今日任务</h3>
    <span class="filter">全部 4项 →</span>
  </div>
  <div class="quest-list">
    <div class="quest-item">
      <div class="quest-rank rank-s">🏋️</div>
      <div class="quest-body">
        <div class="quest-name">胸 + 三头 · 力量训练</div>
        <div class="quest-desc">45分钟 · 6个动作 · 健身房</div>
      </div>
      <div class="quest-reward">
        <div class="qr-xp">+120</div>
        <div class="qr-label">S级任务</div>
      </div>
    </div>

    <div class="quest-item">
      <div class="quest-rank rank-a">🥗</div>
      <div class="quest-body">
        <div class="quest-name">高蛋白午餐补给</div>
        <div class="quest-desc">580kcal · 鸡胸肉+糙米+西兰花</div>
      </div>
      <div class="quest-reward">
        <div class="qr-xp">+50</div>
        <div class="qr-label">A级任务</div>
      </div>
    </div>

    <div class="quest-item">
      <div class="quest-rank rank-b">💧</div>
      <div class="quest-body">
        <div class="quest-name">水源补充</div>
        <div class="quest-desc">已喝 1.2L / 目标 2.5L</div>
      </div>
      <div class="quest-reward">
        <div class="qr-xp">+30</div>
        <div class="qr-label">B级任务</div>
      </div>
    </div>

    <div class="quest-item">
      <div class="quest-rank rank-c">📸</div>
      <div class="quest-body">
        <div class="quest-name">周度体型采样</div>
        <div class="quest-desc">拍照对比 · 已连续 4 周</div>
      </div>
      <div class="quest-reward">
        <div class="qr-xp">+80</div>
        <div class="qr-label">C级任务</div>
      </div>
    </div>
  </div>

  <!-- Quick Access -->
  <div class="quick-split">
    <button class="split-btn">
      <span class="sb-icon">🍽️</span>
      <span class="sb-label">饮食方案</span>
      <span class="sb-sub">剩余 1200 kcal</span>
    </button>
    <button class="split-btn">
      <span class="sb-icon">🏃</span>
      <span class="sb-label">训练计划</span>
      <span class="sb-sub">本周 3/5 次</span>
    </button>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <button class="nav-tab active"><span class="nt-icon">🏠</span>首页</button>
    <button class="nav-tab"><span class="nt-icon">📋</span>计划</button>
    <button class="nav-tab center"><span class="nt-icon">➕</span>打卡</button>
    <button class="nav-tab"><span class="nt-icon">📊</span>数据</button>
    <button class="nav-tab"><span class="nt-icon">👤</span>我的</button>
  </div>
</div>
</body>
</html>
