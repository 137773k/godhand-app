<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Single Hand Login Reference</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #040506;
        --gold: #f4d9a0;
        --gold-strong: #e0a74d;
        --text: #f8f4ed;
        --muted: rgba(248, 244, 237, 0.72);
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 20%, rgba(255, 178, 70, 0.11), transparent 26%),
          radial-gradient(circle at 50% 82%, rgba(255, 180, 82, 0.12), transparent 28%),
          linear-gradient(180deg, #050607, #020304);
        font-family: Inter, "SF Pro Display", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        padding: 18px;
        color: var(--text);
      }

      .frame {
        width: min(100%, 430px);
        aspect-ratio: 9 / 19;
        position: relative;
        overflow: hidden;
        border-radius: 38px;
        background:
          radial-gradient(circle at 50% 16%, rgba(255, 197, 99, 0.09), transparent 24%),
          linear-gradient(180deg, #050607 0%, #030405 100%);
        border: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow: 0 34px 90px rgba(0, 0, 0, 0.68);
      }

      .frame::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(135deg, transparent 0 42%, rgba(255,255,255,0.03) 42.2% 44%, transparent 44.2%),
          linear-gradient(135deg, transparent 56%, rgba(255,255,255,0.025) 56.2% 58.2%, transparent 58.4%);
        opacity: 0.5;
      }

      .dust {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 18% 16%, rgba(255, 229, 166, 0.28) 0 1px, transparent 1.6px),
          radial-gradient(circle at 75% 22%, rgba(255, 238, 205, 0.2) 0 1px, transparent 1.6px),
          radial-gradient(circle at 60% 60%, rgba(255, 205, 111, 0.14) 0 1px, transparent 1.6px),
          radial-gradient(circle at 28% 72%, rgba(255, 232, 176, 0.16) 0 1px, transparent 1.6px);
        opacity: 0.9;
        pointer-events: none;
      }

      .title-wrap {
        position: absolute;
        left: 8%;
        right: 8%;
        top: 7.8%;
        z-index: 5;
      }

      .eyebrow {
        margin: 0 0 10px;
        font-size: 0.72rem;
        letter-spacing: 0.34em;
        color: rgba(255, 239, 207, 0.64);
        text-transform: uppercase;
      }

      .title {
        margin: 0;
        font-family: "Arial Black", Inter, sans-serif;
        font-size: clamp(2.85rem, 9vw, 4.4rem);
        line-height: 0.92;
        color: #f9f5ef;
        text-shadow:
          0 0 10px rgba(255, 205, 114, 0.1),
          0 2px 0 rgba(0, 0, 0, 0.58),
          0 18px 30px rgba(0, 0, 0, 0.52);
      }

      .title strong {
        color: #f2ca77;
      }

      .subtitle {
        margin: 12px 0 0;
        max-width: 23ch;
        color: rgba(248, 244, 237, 0.72);
        font-size: 0.94rem;
        line-height: 1.58;
      }

      .glow {
        position: absolute;
        left: 50%;
        bottom: 15%;
        width: 78%;
        height: 42%;
        transform: translateX(-50%);
        background: radial-gradient(circle at center, rgba(255, 236, 190, 0.78), rgba(255, 198, 97, 0.28) 24%, transparent 68%);
        filter: blur(28px);
        opacity: 0.85;
      }

      .beams {
        position: absolute;
        left: 50%;
        bottom: 16%;
        width: 62%;
        height: 44%;
        transform: translateX(-50%);
        background:
          linear-gradient(100deg, transparent 25%, rgba(255, 232, 169, 0.78) 25.6%, transparent 26.5%),
          linear-gradient(88deg, transparent 40%, rgba(255, 232, 169, 0.74) 40.5%, transparent 41.4%),
          linear-gradient(80deg, transparent 57%, rgba(255, 232, 169, 0.74) 57.4%, transparent 58.3%);
        filter: blur(8px);
        opacity: 0.7;
      }

      .hand-stage {
        position: absolute;
        left: 50%;
        bottom: 5.5%;
        width: 92%;
        height: 56%;
        transform: translateX(-50%);
        z-index: 3;
      }

      .hand {
        position: absolute;
        left: 50%;
        bottom: 0;
        width: 64%;
        height: 82%;
        transform: translateX(-50%);
      }

      .palm {
        position: absolute;
        left: 50%;
        bottom: 2%;
        width: 58%;
        height: 42%;
        transform: translateX(-50%);
        border-radius: 40% 40% 30% 30%;
        background:
          radial-gradient(circle at 50% 26%, rgba(255, 246, 228, 0.94), rgba(233, 220, 200, 0.96) 30%, rgba(180, 164, 145, 0.92) 68%, rgba(98, 88, 81, 1) 100%);
        box-shadow:
          inset 0 14px 24px rgba(255, 255, 255, 0.2),
          inset 0 -20px 30px rgba(52, 43, 35, 0.28),
          0 0 0 1px rgba(255, 226, 165, 0.08);
      }

      .palm::before {
        content: "";
        position: absolute;
        inset: 12% 12% 14%;
        border-radius: inherit;
        background:
          radial-gradient(circle at 50% 20%, rgba(255, 255, 255, 0.75), transparent 20%),
          radial-gradient(circle at 50% 34%, rgba(255, 248, 236, 0.86), rgba(227, 215, 199, 0.72) 36%, rgba(168, 153, 138, 0.42) 62%, transparent 84%);
        clip-path: polygon(22% 0%, 78% 0%, 92% 18%, 92% 48%, 80% 74%, 64% 88%, 36% 88%, 20% 74%, 8% 48%, 8% 18%);
      }

      .palm::after {
        content: "";
        position: absolute;
        inset: 26% 34% 18%;
        border-radius: 50%;
        background: radial-gradient(circle at center, rgba(255, 237, 193, 0.82), rgba(255, 196, 92, 0.4) 40%, transparent 76%);
        box-shadow: 0 0 26px rgba(255, 195, 80, 0.52);
      }

      .finger {
        position: absolute;
        bottom: 30%;
        width: 10.5%;
        border-radius: 999px;
        background:
          linear-gradient(180deg, rgba(255, 248, 238, 0.95), rgba(232, 222, 209, 0.94) 24%, rgba(194, 178, 160, 0.96) 56%, rgba(118, 107, 98, 0.98) 100%);
        box-shadow:
          inset 0 12px 18px rgba(255, 255, 255, 0.16),
          inset 0 -18px 20px rgba(45, 38, 31, 0.26);
      }

      .finger::after {
        content: "";
        position: absolute;
        inset: 10% 22%;
        border-radius: inherit;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.45), transparent 72%);
      }

      .f1 { left: 20%; height: 38%; transform: rotate(-16deg); }
      .f2 { left: 33%; height: 47%; transform: rotate(-7deg); }
      .f3 { left: 47%; height: 52%; transform: rotate(0deg); }
      .f4 { left: 61%; height: 45%; transform: rotate(9deg); }
      .thumb {
        position: absolute;
        left: 11%;
        bottom: 22%;
        width: 14%;
        height: 26%;
        border-radius: 999px;
        transform: rotate(-42deg);
        background:
          linear-gradient(180deg, rgba(255, 248, 238, 0.95), rgba(229, 219, 205, 0.95) 24%, rgba(191, 175, 159, 0.94) 60%, rgba(118, 107, 98, 0.98) 100%);
        box-shadow:
          inset 0 12px 18px rgba(255, 255, 255, 0.18),
          inset 0 -16px 18px rgba(45, 38, 31, 0.26);
      }

      .thumb::after {
        content: "";
        position: absolute;
        inset: 12% 24%;
        border-radius: inherit;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.48), transparent 72%);
      }

      .wrist {
        position: absolute;
        left: 28%;
        bottom: -2%;
        width: 44%;
        height: 18%;
        border-radius: 26px 26px 22px 22px;
        background:
          linear-gradient(180deg, rgba(238, 231, 221, 0.96), rgba(186, 177, 166, 0.98) 42%, rgba(92, 84, 78, 1) 100%);
        box-shadow:
          inset 0 12px 18px rgba(255, 255, 255, 0.16),
          inset 0 -14px 18px rgba(60, 55, 52, 0.24);
      }

      .knuckles {
        position: absolute;
        left: 50%;
        bottom: 43%;
        width: 72%;
        height: 10%;
        transform: translateX(-50%);
        background:
          radial-gradient(circle at 12% 50%, rgba(255, 214, 127, 0.66), transparent 16%),
          radial-gradient(circle at 34% 50%, rgba(255, 214, 127, 0.66), transparent 16%),
          radial-gradient(circle at 56% 50%, rgba(255, 214, 127, 0.66), transparent 16%),
          radial-gradient(circle at 78% 50%, rgba(255, 214, 127, 0.66), transparent 16%);
        filter: blur(1px);
        opacity: 0.85;
      }

      .dust-trail {
        position: absolute;
        left: 50%;
        bottom: 44%;
        width: 50%;
        height: 10%;
        transform: translateX(-50%);
        background: linear-gradient(90deg, transparent, rgba(255, 225, 154, 0.8), transparent);
        filter: blur(8px);
        opacity: 0.75;
      }

      .ui {
        position: absolute;
        left: 50%;
        top: 52%;
        width: min(82%, 340px);
        transform: translateX(-50%);
        z-index: 6;
      }

      .field {
        border-radius: 16px;
        border: 1px solid rgba(255, 220, 140, 0.16);
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(12px);
        padding: 16px 18px 18px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }

      .placeholder {
        text-align: center;
        color: rgba(248, 244, 237, 0.84);
        font-size: 0.96rem;
        margin-bottom: 12px;
      }

      .line {
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(255, 188, 69, 0.92), transparent);
        box-shadow: 0 0 14px rgba(255, 188, 69, 0.42);
      }

      .button {
        width: 100%;
        margin-top: 14px;
        border: 0;
        border-radius: 999px;
        padding: 16px 20px;
        background:
          linear-gradient(135deg, rgba(255, 207, 103, 0.94), rgba(255, 148, 37, 0.92) 54%, rgba(184, 92, 11, 0.92));
        color: #fff9ef;
        font-size: 0.98rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        box-shadow:
          0 0 0 1px rgba(255, 238, 190, 0.18),
          0 16px 30px rgba(168, 92, 17, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.24);
      }

      .hint {
        position: absolute;
        left: 50%;
        bottom: 4.8%;
        transform: translateX(-50%);
        z-index: 6;
        color: rgba(255, 222, 142, 0.74);
        font-size: 0.7rem;
        letter-spacing: 0.28em;
        white-space: nowrap;
      }

      @media (max-width: 480px) {
        body { padding: 10px; }
      }
    </style>
  </head>
  <body>
    <main class="frame" aria-label="Single hand login reference">
      <div class="dust"></div>
      <section class="title-wrap">
        <p class="eyebrow">sacred strength</p>
        <h1 class="title">上帝之<strong>手</strong></h1>
        <p class="subtitle">真实、神圣、克制，把力量收束成一个能点亮自我的入口。</p>
      </section>

      <div class="glow"></div>
      <div class="beams"></div>

      <section class="hand-stage" aria-hidden="true">
        <div class="hand">
          <div class="palm"></div>
          <div class="finger f1"></div>
          <div class="finger f2"></div>
          <div class="finger f3"></div>
          <div class="finger f4"></div>
          <div class="thumb"></div>
          <div class="wrist"></div>
          <div class="knuckles"></div>
        </div>
        <div class="dust-trail"></div>
      </section>

      <section class="ui">
        <div class="field">
          <div class="placeholder">输入邮箱</div>
          <div class="line"></div>
        </div>
        <button class="button" type="button">开始塑造</button>
      </section>

      <div class="hint">ONLY ONE HAND / ONE WILL</div>
    </main>
  </body>
</html>
