<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forge Hands Login Reference</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050608;
        --ember: #e3b45d;
        --ember-2: #ff8a1f;
        --stone: #c7b7a0;
        --text: #f7f1e8;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 18%, rgba(255, 166, 51, 0.12), transparent 24%),
          radial-gradient(circle at 50% 86%, rgba(255, 170, 55, 0.14), transparent 28%),
          linear-gradient(180deg, #060709, #020304);
        font-family: Inter, "SF Pro Display", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        padding: 18px;
        color: var(--text);
      }

      .frame {
        width: min(100%, 430px);
        aspect-ratio: 9 / 19;
        position: relative;
        overflow: hidden;
        border-radius: 38px;
        background:
          radial-gradient(circle at 50% 15%, rgba(255, 183, 77, 0.08), transparent 24%),
          linear-gradient(180deg, #050608 0%, #030405 100%);
        border: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow:
          0 34px 90px rgba(0, 0, 0, 0.68),
          inset 0 1px 0 rgba(255, 255, 255, 0.03);
      }

      .frame::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(135deg, transparent 0 42%, rgba(255, 255, 255, 0.03) 42.2% 43.8%, transparent 44%),
          linear-gradient(135deg, transparent 58%, rgba(255, 255, 255, 0.024) 58.2% 60%, transparent 60.2%);
        opacity: 0.65;
      }

      .title-wrap {
        position: absolute;
        left: 7.5%;
        right: 7.5%;
        top: 7.8%;
        z-index: 6;
      }

      .eyebrow {
        margin: 0 0 10px;
        font-size: 0.72rem;
        letter-spacing: 0.34em;
        color: rgba(255, 242, 210, 0.62);
        text-transform: uppercase;
      }

      .title {
        margin: 0;
        font-family: "Arial Black", Inter, sans-serif;
        font-size: clamp(2.9rem, 9.3vw, 4.5rem);
        line-height: 0.92;
        color: #f8f3eb;
        text-shadow:
          0 0 12px rgba(255, 188, 68, 0.08),
          0 2px 0 rgba(0, 0, 0, 0.55),
          0 16px 28px rgba(0, 0, 0, 0.5);
      }

      .title strong {
        color: #f0c36d;
      }

      .subtitle {
        margin: 12px 0 0;
        max-width: 21ch;
        color: rgba(247, 241, 232, 0.72);
        font-size: 0.92rem;
        line-height: 1.55;
      }

      .workshop {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .forge {
        position: absolute;
        left: 50%;
        bottom: 9%;
        width: 100%;
        height: 52%;
        transform: translateX(-50%);
      }

      .anvil-shadow {
        position: absolute;
        left: 50%;
        bottom: 0;
        width: 50%;
        height: 10%;
        transform: translateX(-50%);
        background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.72), transparent 72%);
        filter: blur(18px);
      }

      .heat {
        position: absolute;
        left: 50%;
        bottom: 18%;
        width: 76%;
        height: 32%;
        transform: translateX(-50%);
        background: radial-gradient(circle at center, rgba(255, 184, 83, 0.28), rgba(255, 145, 39, 0.1) 30%, transparent 70%);
        filter: blur(26px);
        opacity: 0.85;
      }

      .statue {
        position: absolute;
        left: 50%;
        bottom: 6%;
        width: 44%;
        height: 60%;
        transform: translateX(-50%);
      }

      .torso {
        position: absolute;
        left: 50%;
        bottom: 0;
        width: 78%;
        height: 72%;
        transform: translateX(-50%);
        background:
          linear-gradient(180deg, rgba(250, 244, 235, 0.92), rgba(222, 212, 199, 0.94) 16%, rgba(189, 177, 160, 0.96) 40%, rgba(142, 131, 117, 0.96) 76%, rgba(86, 78, 71, 1) 100%);
        border-radius: 42% 42% 26% 26% / 28% 28% 18% 18%;
        box-shadow:
          inset 0 18px 30px rgba(255, 255, 255, 0.24),
          inset 0 -26px 36px rgba(53, 43, 33, 0.34),
          0 0 0 1px rgba(255, 226, 174, 0.1);
      }

      .torso::before {
        content: "";
        position: absolute;
        inset: 10% 14% 18%;
        border-radius: inherit;
        background:
          radial-gradient(circle at 50% 15%, rgba(255, 255, 255, 0.6), transparent 18%),
          radial-gradient(circle at 50% 30%, rgba(255, 249, 240, 0.94), rgba(220, 211, 198, 0.84) 24%, rgba(174, 163, 148, 0.46) 52%, transparent 78%);
        clip-path: polygon(22% 0%, 78% 0%, 92% 20%, 88% 52%, 76% 72%, 62% 87%, 38% 87%, 24% 72%, 12% 52%, 8% 20%);
      }

      .abs {
        position: absolute;
        left: 50%;
        top: 22%;
        width: 52%;
        height: 30%;
        transform: translateX(-50%);
        border-radius: 20px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(211, 199, 183, 0.82) 36%, rgba(146, 134, 121, 0.56) 100%);
        clip-path: polygon(16% 0%, 84% 0%, 94% 20%, 88% 48%, 78% 70%, 64% 90%, 36% 90%, 22% 70%, 12% 48%, 6% 20%);
        box-shadow: inset 0 12px 20px rgba(255, 255, 255, 0.18);
      }

      .cut-lines {
        position: absolute;
        inset: 24% 18% 18%;
        background:
          linear-gradient(90deg, transparent 18%, rgba(255, 210, 110, 0.24) 18.5%, transparent 19%),
          linear-gradient(90deg, transparent 50%, rgba(255, 210, 110, 0.24) 50.5%, transparent 51%),
          linear-gradient(90deg, transparent 72%, rgba(255, 210, 110, 0.18) 72.5%, transparent 73%);
        mix-blend-mode: screen;
        opacity: 0.6;
      }

      .stone-hands {
        position: absolute;
        left: 50%;
        bottom: 4%;
        width: 100%;
        height: 72%;
        transform: translateX(-50%);
      }

      .hand {
        position: absolute;
        bottom: 0;
        width: 36%;
        height: 60%;
        border-radius: 46% 46% 26% 26% / 28% 28% 18% 18%;
        background:
          linear-gradient(180deg, rgba(255, 244, 232, 0.95), rgba(226, 216, 204, 0.92) 24%, rgba(191, 177, 160, 0.88) 58%, rgba(110, 100, 90, 0.95) 100%);
        box-shadow:
          inset 0 16px 22px rgba(255, 255, 255, 0.24),
          inset 0 -18px 22px rgba(54, 44, 35, 0.26),
          0 0 0 1px rgba(255, 224, 172, 0.08);
      }

      .hand.left {
        left: 7%;
        transform: rotate(-14deg);
      }

      .hand.right {
        right: 7%;
        transform: rotate(14deg);
      }

      .hand::before {
        content: "";
        position: absolute;
        left: 50%;
        bottom: 48%;
        width: 86%;
        height: 12%;
        transform: translateX(-50%);
        border-radius: 999px;
        background: linear-gradient(180deg, rgba(255, 230, 161, 0.9), rgba(255, 164, 53, 0.1));
        box-shadow: 0 0 16px rgba(255, 182, 64, 0.44);
      }

      .fingers {
        position: absolute;
        left: 50%;
        bottom: 26%;
        width: 74%;
        height: 70%;
        transform: translateX(-50%);
      }

      .finger {
        position: absolute;
        bottom: 0;
        width: 11%;
        border-radius: 999px;
        background:
          linear-gradient(180deg, rgba(255, 247, 235, 0.95), rgba(230, 220, 206, 0.95) 24%, rgba(187, 172, 153, 0.94) 58%, rgba(111, 101, 92, 0.98) 100%);
        box-shadow:
          inset 0 14px 18px rgba(255, 255, 255, 0.16),
          inset 0 -18px 20px rgba(45, 38, 31, 0.28);
      }

      .hand.left .finger.f1 { left: 16%; height: 40%; transform: rotate(-20deg); }
      .hand.left .finger.f2 { left: 31%; height: 48%; transform: rotate(-10deg); }
      .hand.left .finger.f3 { left: 47%; height: 52%; transform: rotate(0deg); }
      .hand.left .finger.f4 { left: 63%; height: 45%; transform: rotate(8deg); }

      .hand.right .finger.f1 { left: 16%; height: 40%; transform: rotate(20deg); }
      .hand.right .finger.f2 { left: 31%; height: 48%; transform: rotate(10deg); }
      .hand.right .finger.f3 { left: 47%; height: 52%; transform: rotate(0deg); }
      .hand.right .finger.f4 { left: 63%; height: 45%; transform: rotate(-8deg); }

      .chip {
        position: absolute;
        left: 50%;
        bottom: 21%;
        width: 56%;
        height: 38%;
        transform: translateX(-50%);
        border-radius: 50% 50% 28% 28%;
        background:
          radial-gradient(circle at 50% 38%, rgba(255, 236, 188, 0.9), rgba(255, 191, 92, 0.45) 34%, rgba(99, 55, 14, 0.38) 74%, transparent 100%);
        filter: blur(0.2px);
        box-shadow:
          0 0 42px rgba(255, 170, 45, 0.34),
          inset 0 14px 22px rgba(255, 255, 255, 0.22),
          inset 0 -22px 28px rgba(96, 50, 10, 0.32);
      }

      .chip::before {
        content: "";
        position: absolute;
        inset: 18% 18% 16%;
        border-radius: 50%;
        border: 1px solid rgba(255, 243, 205, 0.34);
      }

      .shards {
        position: absolute;
        inset: 0;
      }

      .shard {
        position: absolute;
        background: linear-gradient(180deg, rgba(255, 231, 172, 0.9), rgba(214, 166, 61, 0.4));
        box-shadow: 0 0 12px rgba(255, 194, 80, 0.58);
        clip-path: polygon(50% 0%, 100% 100%, 0 100%);
        opacity: 0.82;
      }

      .s1 { left: 32%; top: 42%; width: 5px; height: 24px; transform: rotate(-18deg); }
      .s2 { left: 39%; top: 37%; width: 4px; height: 18px; transform: rotate(12deg); }
      .s3 { left: 52%; top: 35%; width: 6px; height: 26px; transform: rotate(-4deg); }
      .s4 { left: 61%; top: 38%; width: 4px; height: 17px; transform: rotate(18deg); }
      .s5 { left: 68%; top: 43%; width: 5px; height: 20px; transform: rotate(-14deg); }

      .forge-fire {
        position: absolute;
        left: 50%;
        bottom: 13%;
        width: 84%;
        height: 12%;
        transform: translateX(-50%);
        background: radial-gradient(ellipse at center, rgba(255, 143, 41, 0.24), transparent 70%);
        filter: blur(16px);
      }

      .ui {
        position: absolute;
        left: 50%;
        top: 52%;
        width: min(82%, 340px);
        transform: translateX(-50%);
        z-index: 7;
      }

      .field {
        border-radius: 16px;
        border: 1px solid rgba(255, 219, 140, 0.18);
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(12px);
        padding: 16px 18px 18px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }

      .placeholder {
        text-align: center;
        color: rgba(247, 241, 232, 0.85);
        font-size: 0.96rem;
        margin-bottom: 12px;
      }

      .line {
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(255, 188, 69, 0.92), transparent);
        box-shadow: 0 0 16px rgba(255, 188, 69, 0.42);
      }

      .button {
        width: 100%;
        margin-top: 14px;
        border: 0;
        border-radius: 999px;
        padding: 16px 20px;
        background:
          linear-gradient(135deg, rgba(255, 194, 76, 0.94), rgba(255, 134, 27, 0.92) 52%, rgba(178, 89, 11, 0.92));
        color: #fffaf1;
        font-size: 0.98rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        box-shadow:
          0 0 0 1px rgba(255, 238, 190, 0.18),
          0 16px 30px rgba(168, 92, 17, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.24);
      }

      .hint {
        position: absolute;
        left: 50%;
        bottom: 4.8%;
        transform: translateX(-50%);
        z-index: 7;
        color: rgba(255, 220, 138, 0.74);
        font-size: 0.71rem;
        letter-spacing: 0.28em;
        white-space: nowrap;
      }

      @media (max-width: 480px) {
        body {
          padding: 10px;
        }
      }
    </style>
  </head>
  <body>
    <main class="frame" aria-label="Forge hands login reference">
      <div class="title-wrap">
        <p class="eyebrow">forged in darkness</p>
        <h1 class="title">上帝之<strong>手</strong></h1>
        <p class="subtitle">从黑暗中塑造自己，让训练成为锻造，让意志成为形体。</p>
      </div>

      <section class="workshop" aria-hidden="true">
        <div class="forge-fire"></div>
        <div class="heat"></div>
        <div class="forge">
          <div class="statue">
            <div class="chip"></div>
            <div class="torso">
              <div class="abs"></div>
              <div class="cut-lines"></div>
            </div>
            <div class="shards">
              <div class="shard s1"></div>
              <div class="shard s2"></div>
              <div class="shard s3"></div>
              <div class="shard s4"></div>
              <div class="shard s5"></div>
            </div>
          </div>

          <div class="stone-hands">
            <div class="hand left">
              <div class="fingers">
                <div class="finger f1"></div>
                <div class="finger f2"></div>
                <div class="finger f3"></div>
                <div class="finger f4"></div>
              </div>
            </div>
            <div class="hand right">
              <div class="fingers">
                <div class="finger f1"></div>
                <div class="finger f2"></div>
                <div class="finger f3"></div>
                <div class="finger f4"></div>
              </div>
            </div>
          </div>

          <div class="anvil-shadow"></div>
        </div>
      </section>

      <section class="ui">
        <div class="field">
          <div class="placeholder">输入邮箱</div>
          <div class="line"></div>
        </div>
        <button class="button" type="button">开始塑造</button>
      </section>

      <div class="hint">IRON WILL / GOLD DUST</div>
    </main>
  </body>
</html>
