<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hand of God Login Reference</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-a: #080c14;
        --bg-b: #0a0f1a;
        --gold: #f3d08a;
        --gold-2: #d8a54e;
        --gold-3: #ffefbf;
        --text: #f7f4ee;
        --muted: rgba(247, 244, 238, 0.7);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 15%, rgba(182, 134, 40, 0.14), transparent 30%),
          radial-gradient(circle at 20% 18%, rgba(255, 221, 137, 0.08), transparent 18%),
          radial-gradient(circle at 80% 28%, rgba(255, 205, 114, 0.07), transparent 20%),
          linear-gradient(180deg, var(--bg-a), var(--bg-b));
        font-family: Inter, SF Pro Display, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        padding: 18px;
        color: var(--text);
      }

      .frame {
        width: min(100%, 430px);
        aspect-ratio: 9 / 19;
        position: relative;
        overflow: hidden;
        border-radius: 38px;
        background:
          linear-gradient(180deg, rgba(10, 15, 26, 0.55), rgba(6, 9, 16, 0.78)),
          radial-gradient(circle at 50% 80%, rgba(243, 208, 138, 0.12), transparent 36%),
          linear-gradient(180deg, #090d16 0%, #05070d 100%);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow:
          0 30px 90px rgba(0, 0, 0, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }

      .grid {
        position: absolute;
        inset: -10%;
        opacity: 0.18;
        background:
          linear-gradient(rgba(143, 167, 201, 0.11) 1px, transparent 1px),
          linear-gradient(90deg, rgba(143, 167, 201, 0.11) 1px, transparent 1px);
        background-size: 48px 48px;
        mask-image: linear-gradient(180deg, transparent 0%, black 16%, black 80%, transparent 100%);
        transform: perspective(900px) rotateX(68deg) translateY(44%);
      }

      .dust,
      .dust::before,
      .dust::after {
        position: absolute;
        inset: 0;
        content: "";
        pointer-events: none;
      }

      .dust {
        background:
          radial-gradient(circle at 18% 22%, rgba(255, 228, 163, 0.35) 0 1px, transparent 1.8px),
          radial-gradient(circle at 31% 15%, rgba(255, 244, 214, 0.22) 0 1px, transparent 1.8px),
          radial-gradient(circle at 75% 18%, rgba(255, 223, 149, 0.35) 0 1px, transparent 1.8px),
          radial-gradient(circle at 83% 34%, rgba(255, 240, 194, 0.28) 0 1px, transparent 1.8px),
          radial-gradient(circle at 70% 66%, rgba(255, 206, 121, 0.22) 0 1px, transparent 1.8px);
        filter: blur(0.15px);
      }

      .halo {
        position: absolute;
        left: 50%;
        bottom: 8%;
        width: 88%;
        height: 44%;
        transform: translateX(-50%);
        background: radial-gradient(ellipse at center, rgba(255, 216, 126, 0.28), transparent 65%);
        filter: blur(18px);
        opacity: 0.75;
      }

      .title-wrap {
        position: absolute;
        top: 8.2%;
        left: 7.5%;
        right: 7.5%;
        z-index: 4;
      }

      .eyebrow {
        margin: 0 0 12px;
        letter-spacing: 0.34em;
        font-size: 0.72rem;
        color: rgba(255, 238, 199, 0.7);
      }

      .title {
        margin: 0;
        font-family: "Arial Black", Inter, sans-serif;
        font-size: clamp(2.7rem, 9vw, 4.6rem);
        line-height: 0.95;
        letter-spacing: 0.02em;
        color: #f7f7f4;
        text-shadow:
          0 0 8px rgba(255, 214, 129, 0.28),
          0 2px 0 rgba(0, 0, 0, 0.58),
          0 16px 30px rgba(0, 0, 0, 0.6);
      }

      .title strong {
        color: var(--gold-3);
      }

      .orbit {
        position: absolute;
        left: 50%;
        top: 26%;
        width: 70%;
        height: 20%;
        transform: translateX(-50%);
        z-index: 3;
        filter: drop-shadow(0 0 18px rgba(255, 215, 130, 0.18));
      }

      .shape {
        position: absolute;
        display: grid;
        place-items: center;
        color: rgba(255, 238, 203, 0.95);
        border: 1px solid rgba(255, 220, 150, 0.6);
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 213, 130, 0.08)),
          rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(8px);
        box-shadow:
          inset 0 0 0 1px rgba(255, 245, 215, 0.08),
          0 0 22px rgba(255, 209, 109, 0.18);
        animation: float 7s ease-in-out infinite;
      }

      .shape:nth-child(1) {
        width: 70px;
        height: 70px;
        left: 6%;
        top: 18%;
        border-radius: 18px;
        clip-path: polygon(50% 0%, 91% 25%, 91% 75%, 50% 100%, 9% 75%, 9% 25%);
      }

      .shape:nth-child(2) {
        width: 84px;
        height: 84px;
        right: 10%;
        top: 0;
        border-radius: 50%;
        animation-delay: -2s;
        box-shadow:
          inset 0 0 0 14px rgba(255, 236, 190, 0.08),
          0 0 22px rgba(255, 209, 109, 0.2);
      }

      .shape:nth-child(3) {
        width: 74px;
        height: 74px;
        left: 50%;
        top: 22%;
        transform: translateX(-50%) rotate(18deg);
        clip-path: polygon(50% 0%, 80% 10%, 100% 35%, 90% 68%, 64% 92%, 34% 92%, 9% 68%, 0% 35%, 20% 10%);
        animation-delay: -4s;
      }

      .shape::before {
        content: "";
        position: absolute;
        inset: 16%;
        border: 1px solid rgba(255, 249, 232, 0.5);
        border-radius: inherit;
      }

      .shape::after {
        content: "";
        position: absolute;
        inset: 30%;
        border-radius: inherit;
        border: 1px solid rgba(255, 235, 180, 0.45);
      }

      .hand {
        position: absolute;
        left: 50%;
        bottom: -3%;
        width: 88%;
        height: 55%;
        transform: translateX(-50%);
        z-index: 2;
        filter: drop-shadow(0 0 26px rgba(255, 203, 103, 0.22));
      }

      .hand::before {
        content: "";
        position: absolute;
        inset: auto 14% 6% 14%;
        height: 54%;
        border-radius: 50% 50% 28% 28%;
        background:
          radial-gradient(circle at 50% 30%, rgba(255, 248, 221, 0.42), transparent 42%),
          linear-gradient(180deg, rgba(255, 229, 170, 0.42), rgba(188, 126, 35, 0.32) 42%, rgba(77, 45, 8, 0.45) 100%);
        border: 1px solid rgba(255, 228, 163, 0.28);
        box-shadow:
          inset 0 18px 28px rgba(255, 255, 255, 0.12),
          inset 0 -20px 34px rgba(53, 26, 2, 0.44);
      }

      .palm {
        position: absolute;
        left: 50%;
        bottom: 14%;
        width: 44%;
        height: 34%;
        transform: translateX(-50%);
        border-radius: 48% 48% 40% 40%;
        background:
          radial-gradient(circle at 50% 36%, rgba(255, 244, 210, 0.88), rgba(255, 208, 126, 0.58) 26%, rgba(171, 109, 23, 0.62) 68%, rgba(56, 28, 6, 0.82) 100%);
        box-shadow:
          inset 0 12px 26px rgba(255, 255, 255, 0.18),
          inset 0 -18px 32px rgba(40, 18, 3, 0.35);
      }

      .veins {
        position: absolute;
        left: 50%;
        bottom: 16%;
        width: 40%;
        height: 28%;
        transform: translateX(-50%);
        background:
          linear-gradient(110deg, transparent 34%, rgba(255, 231, 178, 0.6) 34.4%, rgba(255, 231, 178, 0.15) 38%, transparent 38.2%),
          linear-gradient(76deg, transparent 52%, rgba(255, 231, 178, 0.48) 52.2%, rgba(255, 231, 178, 0.12) 55%, transparent 55.2%),
          linear-gradient(30deg, transparent 24%, rgba(255, 231, 178, 0.5) 24.2%, rgba(255, 231, 178, 0.12) 27%, transparent 27.2%);
        opacity: 0.72;
        mix-blend-mode: screen;
      }

      .finger {
        position: absolute;
        bottom: 40%;
        width: 9.6%;
        height: 31%;
        border-radius: 999px;
        background:
          radial-gradient(circle at 50% 10%, rgba(255, 250, 231, 0.8), rgba(255, 217, 134, 0.66) 32%, rgba(193, 127, 32, 0.68) 75%, rgba(54, 25, 5, 0.9) 100%);
        box-shadow:
          inset 0 12px 18px rgba(255, 255, 255, 0.16),
          inset 0 -18px 22px rgba(43, 17, 3, 0.4);
        transform-origin: bottom center;
      }

      .finger::after {
        content: "";
        position: absolute;
        inset: 8% 18%;
        border-radius: inherit;
        background: linear-gradient(180deg, rgba(255, 245, 212, 0.28), transparent 68%);
      }

      .finger.f1 {
        left: 23%;
        height: 34%;
        transform: rotate(-18deg);
      }

      .finger.f2 {
        left: 34%;
        height: 38%;
        transform: rotate(-6deg);
      }

      .finger.f3 {
        left: 46%;
        height: 40%;
        transform: rotate(2deg);
      }

      .finger.f4 {
        left: 58%;
        height: 37%;
        transform: rotate(10deg);
      }

      .finger.f5 {
        left: 69%;
        height: 33%;
        transform: rotate(18deg);
      }

      .thumb {
        position: absolute;
        left: 17%;
        bottom: 28%;
        width: 11%;
        height: 24%;
        border-radius: 999px;
        transform: rotate(-42deg);
        background:
          radial-gradient(circle at 50% 10%, rgba(255, 250, 231, 0.7), rgba(255, 217, 134, 0.64) 35%, rgba(185, 119, 26, 0.7) 76%, rgba(54, 25, 5, 0.92) 100%);
        box-shadow:
          inset 0 12px 18px rgba(255, 255, 255, 0.14),
          inset 0 -16px 22px rgba(43, 17, 3, 0.38);
      }

      .wrist {
        position: absolute;
        left: 32%;
        bottom: -1%;
        width: 36%;
        height: 16%;
        border-radius: 28px 28px 22px 22px;
        background:
          linear-gradient(180deg, rgba(255, 236, 186, 0.42), rgba(163, 103, 20, 0.3) 40%, rgba(50, 23, 4, 0.82) 100%);
        box-shadow:
          inset 0 12px 16px rgba(255, 255, 255, 0.08),
          inset 0 -14px 18px rgba(0, 0, 0, 0.42);
      }

      .beam {
        position: absolute;
        left: 50%;
        bottom: 16%;
        width: 58%;
        height: 50%;
        transform: translateX(-50%);
        background: radial-gradient(circle at 50% 40%, rgba(255, 238, 193, 0.82), rgba(255, 213, 115, 0.55) 18%, rgba(255, 188, 67, 0.12) 40%, transparent 70%);
        filter: blur(22px);
        opacity: 0.8;
      }

      .ui {
        position: absolute;
        left: 50%;
        top: 52%;
        width: min(84%, 350px);
        transform: translateX(-50%);
        z-index: 5;
      }

      .email-label {
        margin: 0 0 10px;
        font-size: 0.78rem;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: rgba(247, 244, 238, 0.5);
        text-align: center;
      }

      .input-shell {
        position: relative;
        padding: 14px 0 18px;
      }

      .input-shell::before {
        content: "";
        position: absolute;
        inset: 0 0 0 0;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 225, 160, 0.08);
        backdrop-filter: blur(12px);
      }

      .line {
        position: relative;
        height: 1px;
        margin: 12px 16px 12px;
        background: linear-gradient(90deg, transparent, rgba(255, 234, 183, 0.92), transparent);
        box-shadow: 0 0 18px rgba(255, 208, 116, 0.65);
      }

      .placeholder {
        position: relative;
        z-index: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 28px;
        color: rgba(255, 247, 224, 0.84);
        font-size: 0.95rem;
        letter-spacing: 0.02em;
      }

      .begin {
        margin-top: 14px;
        width: 100%;
        border: 0;
        border-radius: 999px;
        padding: 16px 20px;
        background:
          linear-gradient(135deg, rgba(255, 225, 162, 0.96), rgba(212, 150, 57, 0.96) 42%, rgba(240, 171, 112, 0.94) 72%, rgba(193, 98, 88, 0.96));
        color: #fffaf0;
        font-size: 0.98rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        box-shadow:
          0 0 0 1px rgba(255, 236, 188, 0.22),
          0 18px 32px rgba(188, 110, 37, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.35);
      }

      .bottom-hint {
        position: absolute;
        left: 50%;
        bottom: 4.7%;
        transform: translateX(-50%);
        font-size: 0.72rem;
        color: rgba(255, 226, 171, 0.76);
        letter-spacing: 0.22em;
        text-transform: none;
        z-index: 5;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0) rotate(0deg);
        }
        50% {
          transform: translateY(-10px) rotate(4deg);
        }
      }

      @media (max-width: 480px) {
        body {
          padding: 10px;
        }
      }
    </style>
  </head>
  <body>
    <main class="frame" aria-label="Hand of God login reference">
      <div class="grid"></div>
      <div class="dust"></div>
      <div class="halo"></div>
      <div class="beam"></div>

      <section class="title-wrap">
        <p class="eyebrow">DIVINE TECHNOLOGY</p>
        <h1 class="title">HAND OF <strong>GOD</strong></h1>
      </section>

      <div class="orbit" aria-hidden="true">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
      </div>

      <section class="hand" aria-hidden="true">
        <div class="palm"></div>
        <div class="veins"></div>
        <div class="finger f1"></div>
        <div class="finger f2"></div>
        <div class="finger f3"></div>
        <div class="finger f4"></div>
        <div class="finger f5"></div>
        <div class="thumb"></div>
        <div class="wrist"></div>
      </section>

      <section class="ui">
        <div class="email-label">ACCESS / LOGIN</div>
        <div class="input-shell">
          <div class="placeholder">Enter your email</div>
          <div class="line"></div>
        </div>
        <button class="begin" type="button">BEGIN</button>
      </section>

      <div class="bottom-hint">Forged by divine geometry</div>
    </main>
  </body>
</html>
