<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <title>Realistic Hand Login Reference</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #040506;
        --gold: #f5d79d;
        --gold-strong: #e6ad54;
        --text: #f8f3ea;
        --vvh: 100dvh;
        --keyboard-offset: 0px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        background:
          radial-gradient(circle at 50% 14%, rgba(255, 209, 132, 0.11), transparent 22%),
          radial-gradient(circle at 18% 20%, rgba(103, 125, 255, 0.08), transparent 18%),
          radial-gradient(circle at 82% 28%, rgba(255, 171, 73, 0.09), transparent 16%),
          radial-gradient(circle at 50% 88%, rgba(255, 176, 80, 0.08), transparent 24%),
          linear-gradient(180deg, #070809 0%, #030405 100%);
        font-family: Inter, "SF Pro Display", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      html {
        overflow-x: hidden;
      }

      body {
        overflow-x: hidden;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        color: var(--text);
        position: relative;
        touch-action: pan-y;
      }

      body::-webkit-scrollbar {
        width: 0;
        height: 0;
      }

      body::before {
        content: "";
        position: fixed;
        inset: -24%;
        background:
          radial-gradient(circle at 50% 44%, rgba(255, 205, 118, 0.12), transparent 18%),
          radial-gradient(circle at 18% 18%, rgba(107, 128, 255, 0.08), transparent 16%),
          radial-gradient(circle at 84% 70%, rgba(255, 170, 72, 0.06), transparent 18%),
          radial-gradient(circle at 50% 50%, transparent 54%, rgba(0, 0, 0, 0.28) 100%);
        filter: blur(24px);
        opacity: 0.95;
        pointer-events: none;
        z-index: 0;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background:
          linear-gradient(120deg, transparent 0 39%, rgba(255, 255, 255, 0.045) 39.3% 41%, transparent 41.4% 62%, rgba(255, 255, 255, 0.028) 62.3% 63.7%, transparent 64%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.016), transparent 24%, transparent 78%, rgba(255, 255, 255, 0.012));
        mix-blend-mode: screen;
        opacity: 0.46;
        pointer-events: none;
        z-index: 0;
      }

      .stage {
        min-height: var(--vvh);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 18px;
        padding-bottom: calc(18px + var(--keyboard-offset));
        position: relative;
        z-index: 1;
      }

      .frame {
        width: min(100%, 430px, calc((var(--vvh) - 36px) * 9 / 19));
        aspect-ratio: 9 / 19;
        position: relative;
        z-index: 1;
        overflow: hidden;
        border-radius: 34px;
        background:
          radial-gradient(circle at 50% 14%, rgba(255, 214, 138, 0.12), transparent 20%),
          radial-gradient(circle at 50% 42%, rgba(255, 255, 255, 0.035), transparent 28%),
          radial-gradient(circle at 16% 24%, rgba(101, 126, 255, 0.08), transparent 18%),
          radial-gradient(circle at 84% 24%, rgba(255, 186, 86, 0.08), transparent 17%),
          radial-gradient(circle at 50% 82%, rgba(255, 179, 82, 0.11), transparent 30%),
          linear-gradient(180deg, #060709 0%, #030405 100%);
        border: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow:
          0 24px 56px rgba(0, 0, 0, 0.58),
          inset 0 1px 0 rgba(255, 255, 255, 0.03);
      }

      .frame::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 50% 32%, rgba(255, 232, 182, 0.06), transparent 22%),
          radial-gradient(circle at 50% 72%, rgba(255, 174, 76, 0.05), transparent 26%),
          linear-gradient(122deg, transparent 0 38%, rgba(255, 255, 255, 0.05) 38.4% 40.4%, transparent 40.7% 59%, rgba(255, 255, 255, 0.03) 59.3% 61.1%, transparent 61.4%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 28%, transparent 74%, rgba(255, 255, 255, 0.018));
        opacity: 0.72;
      }

      .frame::after {
        content: "";
        position: absolute;
        inset: -12% -12% -8%;
        background:
          radial-gradient(circle at 48% 36%, rgba(255, 232, 174, 0.05), transparent 18%),
          radial-gradient(circle at 50% 80%, rgba(255, 168, 72, 0.07), transparent 28%),
          radial-gradient(circle at 12% 88%, rgba(112, 128, 255, 0.04), transparent 18%),
          linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.06) 68%, rgba(0, 0, 0, 0.3) 100%);
        pointer-events: none;
        mix-blend-mode: screen;
      }

      .liquid-core {
        position: absolute;
        left: 50%;
        top: 15%;
        width: 132%;
        height: 70%;
        transform: translateX(-50%);
        border-radius: 50%;
        background:
          radial-gradient(circle at 50% 28%, rgba(255, 255, 255, 0.05), transparent 22%),
          radial-gradient(circle at 50% 22%, rgba(255, 219, 149, 0.1), transparent 28%),
          radial-gradient(circle at 30% 34%, rgba(111, 132, 255, 0.06), transparent 18%),
          radial-gradient(circle at 72% 30%, rgba(255, 181, 79, 0.07), transparent 18%),
          linear-gradient(145deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.012) 35%, rgba(255, 255, 255, 0.035) 65%, rgba(255, 255, 255, 0.01));
        border: 1px solid rgba(255, 234, 196, 0.06);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.04),
          inset 0 -14px 28px rgba(0, 0, 0, 0.1),
          0 0 30px rgba(255, 206, 121, 0.04);
        filter: blur(1px);
        opacity: 0.52;
        pointer-events: none;
        mix-blend-mode: screen;
      }

      .liquid-sheen {
        position: absolute;
        left: -8%;
        top: 2%;
        width: 118%;
        height: 48%;
        transform: rotate(-10deg);
        background:
          linear-gradient(106deg, transparent 0 34%, rgba(255, 255, 255, 0.02) 34.4% 36.2%, rgba(255, 255, 255, 0.05) 36.6% 39.1%, transparent 39.3% 61%, rgba(255, 255, 255, 0.03) 61.3% 63%, transparent 63.2%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01));
        opacity: 0.42;
        pointer-events: none;
        mix-blend-mode: screen;
      }

      .floor-glow {
        position: absolute;
        left: 50%;
        bottom: -2%;
        width: 88%;
        height: 30%;
        transform: translateX(-50%);
        background:
          radial-gradient(circle at 50% 40%, rgba(255, 185, 84, 0.14), transparent 26%),
          radial-gradient(circle at 50% 52%, rgba(255, 227, 187, 0.05), transparent 36%),
          radial-gradient(circle at 50% 100%, rgba(255, 177, 72, 0.05), transparent 40%);
        filter: blur(20px);
        opacity: 0.52;
        pointer-events: none;
        mix-blend-mode: screen;
      }

      .dust {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 18% 16%, rgba(255, 229, 166, 0.12) 0 1px, transparent 1.6px),
          radial-gradient(circle at 75% 22%, rgba(255, 238, 205, 0.1) 0 1px, transparent 1.6px),
          radial-gradient(circle at 60% 60%, rgba(255, 205, 111, 0.08) 0 1px, transparent 1.6px),
          radial-gradient(circle at 28% 72%, rgba(255, 232, 176, 0.08) 0 1px, transparent 1.6px),
          radial-gradient(circle at 82% 55%, rgba(126, 111, 255, 0.05) 0 1px, transparent 1.6px);
        opacity: 0.62;
        pointer-events: none;
      }

      .haze {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 50% 20%, rgba(255, 220, 148, 0.08), transparent 26%),
          radial-gradient(circle at 20% 82%, rgba(255, 170, 70, 0.05), transparent 24%),
          radial-gradient(circle at 80% 76%, rgba(84, 108, 255, 0.04), transparent 22%),
          radial-gradient(circle at 50% 58%, rgba(255, 247, 235, 0.03), transparent 20%);
        filter: blur(10px);
        opacity: 0.74;
        pointer-events: none;
      }

      .glass-ribbon {
        position: absolute;
        left: 50%;
        top: 20%;
        width: 140%;
        height: 26%;
        transform: translateX(-50%) rotate(-14deg);
        background:
          linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.015) 18%, rgba(255, 255, 255, 0.05) 33%, rgba(255, 255, 255, 0.02) 49%, rgba(255, 255, 255, 0.04) 62%, transparent 78%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01));
        opacity: 0.38;
        pointer-events: none;
      }

      .glass-orb {
        position: absolute;
        border-radius: 50%;
        background:
          radial-gradient(circle at 35% 28%, rgba(255, 255, 255, 0.11), rgba(255, 255, 255, 0.03) 34%, rgba(255, 255, 255, 0.01) 66%, transparent 70%),
          linear-gradient(135deg, rgba(255, 220, 145, 0.05), rgba(255, 255, 255, 0.015));
        border: 1px solid rgba(255, 236, 188, 0.05);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02);
        pointer-events: none;
      }

      .orb-a {
        left: 8%;
        top: 18%;
        width: 28%;
        height: 18%;
        transform: rotate(-12deg);
        opacity: 0.28;
      }

      .orb-b {
        right: -2%;
        top: 26%;
        width: 22%;
        height: 14%;
        transform: rotate(18deg);
        opacity: 0.22;
      }

      .orb-c {
        left: 56%;
        top: 60%;
        width: 32%;
        height: 20%;
        transform: rotate(8deg);
        opacity: 0.18;
      }

      .title-wrap {
        position: absolute;
        left: 10%;
        right: 10%;
        top: 7.7%;
        z-index: 6;
      }

      .eyebrow {
        margin: 0 0 8px;
        font-size: 0.67rem;
        letter-spacing: 0.3em;
        color: rgba(255, 239, 207, 0.46);
        text-transform: uppercase;
      }

      .title {
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        font-family: "Arial Black", Inter, sans-serif;
        font-size: clamp(1.64rem, 5.2vw, 2.24rem);
        line-height: 0.92;
        letter-spacing: 0;
        font-weight: 900;
        color: #f9f5ef;
        text-shadow: 0 2px 18px rgba(0, 0, 0, 0.42);
      }

      .title span {
        display: block;
      }

      .title strong {
        color: #f2ca77;
      }

      .subtitle {
        margin: 9px 0 0;
        max-width: 20ch;
        color: rgba(248, 244, 237, 0.5);
        font-size: 0.75rem;
        line-height: 1.56;
      }

      .ui {
        position: absolute;
        left: 50%;
        top: 47.2%;
        width: min(80%, 320px);
        transform: translateX(-50%);
        z-index: 7;
      }

      .login-form {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .field {
        position: relative;
        overflow: visible;
        border: 0;
        background: transparent;
        padding: 0;
        box-shadow: none;
      }

      .field.is-error {
        box-shadow: none;
      }

      .field.is-error:focus-within {
        box-shadow: none;
      }

      .input-shell {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
        padding: 14px 16px 13px;
        min-height: 54px;
        border-radius: 12px;
        border-bottom: 1px solid rgba(255, 225, 160, 0.22);
        background: rgba(17, 18, 22, 0.66);
        box-shadow: 0 10px 22px rgba(0, 0, 0, 0.16);
        transition: border-color 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
      }

      .field:focus-within .input-shell {
        border-bottom-color: rgba(255, 229, 171, 0.42);
        box-shadow: 0 10px 22px rgba(0, 0, 0, 0.18);
        background: rgba(20, 21, 25, 0.7);
      }

      .field.is-error .input-shell {
        border-bottom-color: rgba(255, 137, 137, 0.3);
      }

      .field.is-error:focus-within .input-shell {
        border-bottom-color: rgba(255, 137, 137, 0.36);
      }

      .input-shell .input {
        min-width: 0;
        flex: 1 1 auto;
      }

      .country-code {
        flex: 0 0 auto;
        color: rgba(255, 226, 166, 0.8);
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        user-select: none;
      }

      .input {
        width: 100%;
        border: 0;
        background: transparent;
        color: #fff7ea;
        font: inherit;
        font-size: 0.92rem;
        line-height: 1.28;
        padding: 0;
        outline: none;
        caret-color: #f6c97e;
      }

      .input::placeholder {
        color: rgba(248, 244, 237, 0.3);
      }

      .input::-webkit-outer-spin-button,
      .input::-webkit-inner-spin-button {
        appearance: none;
        margin: 0;
      }

      .input[type="tel"] {
        appearance: textfield;
      }

      .error {
        margin: 6px 0 0;
        min-height: 0.95em;
        color: rgba(255, 122, 122, 0.92);
        font-size: 0.68rem;
        line-height: 1.25;
      }

      .send-code {
        flex: 0 0 auto;
        min-width: 48px;
        padding: 0;
        border: 0;
        background: transparent;
        color: rgba(255, 235, 202, 0.82);
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        white-space: nowrap;
        border-radius: 0;
        box-shadow: none;
        transition:
          transform 0.18s ease,
          filter 0.18s ease,
          opacity 0.18s ease;
      }

      .send-code:not(:disabled):hover {
        transform: translateY(-1px);
        filter: brightness(1.06);
      }

      .send-code:not(:disabled):active {
        transform: translateY(0) scale(0.98);
        filter: brightness(0.92);
      }

      .send-code:disabled {
        opacity: 0.42;
        cursor: not-allowed;
        filter: saturate(0.45) brightness(0.84);
      }

      .agreement {
        display: flex;
        gap: 8px;
        align-items: flex-start;
        margin: 2px 2px 0;
        color: rgba(248, 244, 237, 0.62);
        font-size: 0.7rem;
        line-height: 1.45;
      }

      .agreement input {
        margin-top: 2px;
        flex: 0 0 auto;
        accent-color: var(--gold-strong);
      }

      .agreement a,
      .register-link {
        color: rgba(255, 223, 156, 0.88);
        text-decoration: none;
      }

      .agreement a:hover,
      .register-link:hover {
        text-decoration: underline;
      }

      .button {
        width: 100%;
        margin-top: 4px;
        border: 1px solid rgba(255, 223, 156, 0.22);
        border-radius: 14px;
        min-height: 46px;
        padding: 12px 18px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        background:
          linear-gradient(135deg, rgba(255, 214, 126, 0.96), rgba(246, 180, 88, 0.94) 54%, rgba(180, 103, 27, 0.92));
        color: #fff9ef;
        font-size: 0.86rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        box-shadow:
          0 0 0 1px rgba(255, 238, 190, 0.16),
          0 16px 28px rgba(168, 92, 17, 0.22);
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease,
          filter 0.18s ease,
          opacity 0.18s ease;
      }

      .button:not(:disabled):hover {
        transform: translateY(-1px);
        box-shadow:
          0 0 0 1px rgba(255, 238, 190, 0.18),
          0 18px 32px rgba(168, 92, 17, 0.26);
      }

      .button:not(:disabled):active {
        transform: translateY(0) scale(0.98);
        filter: brightness(0.88);
      }

      .button:disabled {
        opacity: 0.42;
        cursor: not-allowed;
        filter: saturate(0.4) brightness(0.84);
        box-shadow:
          0 0 0 1px rgba(255, 238, 190, 0.08),
          0 12px 22px rgba(0, 0, 0, 0.16),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }

      .button.is-loading {
        cursor: progress;
      }

      .button-spinner {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 2px solid rgba(255, 247, 229, 0.42);
        border-top-color: transparent;
        animation: spin 0.8s linear infinite;
      }

      .register-link {
        display: block;
        margin-top: 4px;
        text-align: center;
        font-size: 0.7rem;
        line-height: 1.35;
        color: rgba(255, 223, 156, 0.74);
      }

      .toast {
        position: fixed;
        top: calc(max(14px, env(safe-area-inset-top)));
        left: 50%;
        z-index: 20;
        transform: translate(-50%, -12px);
        opacity: 0;
        pointer-events: none;
        padding: 12px 16px;
        max-width: min(88vw, 360px);
        border-radius: 16px;
        border: 1px solid rgba(255, 236, 188, 0.14);
        background: rgba(8, 10, 14, 0.82);
        color: #fff6e7;
        box-shadow:
          0 16px 30px rgba(0, 0, 0, 0.24),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
        transition:
          opacity 0.22s ease,
          transform 0.22s ease;
      }

      .toast.show {
        opacity: 1;
        transform: translate(-50%, 0);
      }

      .toast.success {
        border-color: rgba(255, 215, 138, 0.28);
        box-shadow:
          0 16px 30px rgba(0, 0, 0, 0.24),
          0 0 16px rgba(255, 204, 112, 0.1),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }

      .toast.error {
        border-color: rgba(255, 128, 128, 0.32);
        box-shadow:
          0 16px 30px rgba(0, 0, 0, 0.24),
          0 0 16px rgba(255, 115, 115, 0.1),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }

        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 480px) {
        .stage {
          padding: 10px;
          padding-bottom: calc(10px + var(--keyboard-offset));
        }

        .title-wrap {
          left: 9%;
          right: 9%;
          top: 7.3%;
        }

        .ui {
          width: min(82%, 300px);
          top: 47%;
        }
      }

      body.keyboard-open .stage {
        align-items: start;
      }
    </style>
  </head>
  <body>
    <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <div class="stage">
      <main class="frame" aria-label="Realistic hand login reference">
        <div class="dust"></div>
        <div class="haze"></div>
        <div class="glass-ribbon"></div>
        <div class="glass-orb orb-a"></div>
        <div class="glass-orb orb-b"></div>
        <div class="glass-orb orb-c"></div>
        <div class="liquid-core"></div>
        <div class="liquid-sheen"></div>
        <div class="floor-glow"></div>

        <section class="title-wrap">
          <p class="eyebrow">sacred strength</p>
          <div style="position: relative; display: inline-block;">
            <h1 class="title">
              <span>HAND</span>
              <strong>OF GOD</strong>
            </h1>
          </div>
          <p class="subtitle">把未来拖到掌心里，克制到只剩下力量和光。</p>
        </section>

        <section class="ui">
          <form class="login-form" id="login-form" novalidate>
            <div class="field" data-field="phone">
              <label class="sr-only" for="phone">手机号</label>
              <div class="input-shell input-shell-phone">
                <span class="country-code" aria-hidden="true">+86</span>
                <input
                  id="phone"
                  class="input"
                  type="tel"
                  inputmode="numeric"
                  placeholder="手机号"
                  autocomplete="tel-national"
                  maxlength="11"
                  spellcheck="false"
                  aria-describedby="phone-error"
                  aria-invalid="false"
                />
              </div>
              <p class="error" id="phone-error" aria-live="polite"></p>
            </div>

            <div class="field" data-field="code">
              <div class="input-shell input-shell-code">
                <label class="sr-only" for="code">验证码</label>
                <input
                  id="code"
                  class="input"
                  type="tel"
                  inputmode="numeric"
                  placeholder="验证码"
                  autocomplete="one-time-code"
                  maxlength="6"
                  spellcheck="false"
                  aria-describedby="code-error"
                  aria-invalid="false"
                />
                <button class="send-code" id="send-code" type="button" disabled>发送</button>
              </div>
              <p class="error" id="code-error" aria-live="polite"></p>
            </div>

            <label class="agreement" for="agree">
              <input id="agree" type="checkbox" />
              <span>
                同意
                <a href="#" data-toast="用户协议暂未接入">用户协议</a>
                和
                <a href="#" data-toast="隐私政策暂未接入">隐私政策</a>
              </span>
            </label>
            <button class="button" id="login-btn" type="submit" disabled>
              <span class="button-label">开始登录</span>
              <span class="button-spinner" id="button-spinner" hidden aria-hidden="true"></span>
            </button>
            <a class="register-link" href="#" data-toast="注册入口暂未接入">还没有账号？立即注册</a>
          </form>
        </section>

      </main>
    </div>

    <script>
      (() => {
        const root = document.documentElement;
        const body = document.body;
        const phoneInput = document.getElementById("phone");
        const codeInput = document.getElementById("code");
        const agreeInput = document.getElementById("agree");
        const sendBtn = document.getElementById("send-code");
        const loginForm = document.getElementById("login-form");
        const loginBtn = document.getElementById("login-btn");
        const loginLabel = loginBtn.querySelector(".button-label");
        const spinner = document.getElementById("button-spinner");
        const phoneField = document.querySelector('[data-field="phone"]');
        const codeField = document.querySelector('[data-field="code"]');
        const phoneError = document.getElementById("phone-error");
        const codeError = document.getElementById("code-error");
        const toast = document.getElementById("toast");

        const state = {
          touchedPhone: false,
          touchedCode: false,
          loading: false,
          countdown: 0,
          countdownTimer: null,
          toastTimer: null,
        };

        const phonePattern = /^1\d{10}$/;
        const codePattern = /^\d{6}$/;

        function clampDigits(value, maxLength) {
          return value.replace(/\D/g, "").slice(0, maxLength);
        }

        function isPhoneValid(value) {
          return phonePattern.test(value);
        }

        function isCodeValid(value) {
          return codePattern.test(value);
        }

        function setFieldError(fieldEl, errorEl, message) {
          const active = Boolean(message);
          fieldEl.classList.toggle("is-error", active);
          errorEl.textContent = message;
        }

        function validatePhone(force = false) {
          const value = phoneInput.value;
          let message = "";

          if (!value) {
            if (force) {
              message = "鐠囩柉绶崗銉﹀閺堝搫褰?;
            }
          } else if (!isPhoneValid(value)) {
            message = "鐠囩柉绶崗銉︻劀绾喚娈?1娴ｅ秳鑵戦崶鑺ュ閺堝搫褰?;
          }

          setFieldError(phoneField, phoneError, message);
          phoneInput.setAttribute("aria-invalid", message ? "true" : "false");
          return !message;
        }

        function validateCode(force = false) {
          const value = codeInput.value;
          let message = "";

          if (!value) {
            if (force) {
              message = "鐠囩柉绶崗銉╃崣鐠囦胶鐖?;
            }
          } else if (!isCodeValid(value)) {
            message = "妤犲矁鐦夐惍浣疯礋6娴ｅ秵鏆熺€?;
          }

          setFieldError(codeField, codeError, message);
          codeInput.setAttribute("aria-invalid", message ? "true" : "false");
          return !message;
        }

        function syncViewport() {
          const viewport = window.visualViewport;
          const height = Math.round(viewport ? viewport.height : window.innerHeight);
          const offset = viewport ? Math.max(0, window.innerHeight - viewport.height - viewport.offsetTop) : 0;

          root.style.setProperty("--vvh", `${height}px`);
          root.style.setProperty("--keyboard-offset", `${offset}px`);
          body.classList.toggle("keyboard-open", offset > 80);
        }

        function updateSendState() {
          const enabled = isPhoneValid(phoneInput.value) && state.countdown === 0 && !state.loading;
          sendBtn.disabled = !enabled;
          sendBtn.textContent = state.countdown > 0 ? `${state.countdown}s` : "发送";
        }

        function updateLoginState() {
          const enabled =
            isPhoneValid(phoneInput.value) &&
            isCodeValid(codeInput.value) &&
            agreeInput.checked &&
            !state.loading;

          loginBtn.disabled = !enabled;
          loginBtn.classList.toggle("is-loading", state.loading);
          loginLabel.textContent = state.loading ? "妤犲矁鐦夋稉?.." : "瀵偓婵娅ヨぐ?;
          spinner.hidden = !state.loading;
          loginBtn.setAttribute("aria-busy", state.loading ? "true" : "false");
        }

        function syncState() {
          validatePhone(state.touchedPhone);
          validateCode(state.touchedCode);
          updateSendState();
          updateLoginState();
        }

        function showToast(message, type = "info") {
          clearTimeout(state.toastTimer);
          toast.className = `toast ${type}`;
          toast.textContent = message;
          toast.classList.add("show");
          state.toastTimer = setTimeout(() => {
            toast.classList.remove("show");
          }, 2200);
        }

        function startCountdown() {
          clearInterval(state.countdownTimer);
          state.countdown = 60;
          updateSendState();

          state.countdownTimer = setInterval(() => {
            state.countdown -= 1;
            if (state.countdown <= 0) {
              clearInterval(state.countdownTimer);
              state.countdown = 0;
              updateSendState();
              return;
            }
            updateSendState();
          }, 1000);
        }

        function focusActiveField(event) {
          const target = event.target;
          if (target instanceof HTMLInputElement) {
            window.setTimeout(() => {
              target.scrollIntoView({ block: "center", behavior: "smooth" });
            }, 120);
          }
        }

        phoneInput.addEventListener("input", () => {
          state.touchedPhone = true;
          phoneInput.value = clampDigits(phoneInput.value, 11);
          syncState();
        });

        phoneInput.addEventListener("blur", () => {
          state.touchedPhone = true;
          syncState();
        });

        codeInput.addEventListener("input", () => {
          state.touchedCode = true;
          codeInput.value = clampDigits(codeInput.value, 6);
          syncState();
        });

        codeInput.addEventListener("blur", () => {
          state.touchedCode = true;
          syncState();
        });

        agreeInput.addEventListener("change", syncState);

        sendBtn.addEventListener("click", () => {
          state.touchedPhone = true;
          if (!validatePhone(true)) {
            showToast("閸忓牐绶崗銉︻劀绾喚娈戦幍瀣簚閸?, "error");
            updateSendState();
            return;
          }

          if (state.countdown > 0 || state.loading) {
            return;
          }

          showToast("妤犲矁鐦夐惍浣稿嚒閸欐垿鈧?, "success");
          startCountdown();
        });

        loginForm.addEventListener("submit", (event) => {
          event.preventDefault();
          if (state.loading) {
            return;
          }

          state.touchedPhone = true;
          state.touchedCode = true;

          const phoneOk = validatePhone(true);
          const codeOk = validateCode(true);
          const agreeOk = agreeInput.checked;

          syncState();

          if (!phoneOk || !codeOk || !agreeOk) {
            if (!agreeOk) {
              showToast("鐠囧嘲鍘涢崟楣冣偓澶婂礂鐠?, "error");
            } else {
              showToast("鐠囧嘲鐣崰鍕瑜版洑淇婇幁?, "error");
            }
            return;
          }

          state.loading = true;
          syncState();
          showToast("濮濓絽婀宀冪槈", "info");

          window.setTimeout(() => {
            const success = Math.random() > 0.45;
            state.loading = false;
            syncState();
            showToast(success ? "閻ц缍嶉幋鎰" : "妤犲矁鐦夋径杈Е閿涘矁顕柌宥堢槸", success ? "success" : "error");
          }, 2000);
        });

        document.querySelectorAll("a[data-toast]").forEach((link) => {
          link.addEventListener("click", (event) => {
            event.preventDefault();
            showToast(link.getAttribute("data-toast") || "閺堫亝甯撮崗?, "info");
          });
        });

        window.addEventListener("focusin", focusActiveField);
        window.addEventListener("resize", syncViewport);
        window.visualViewport?.addEventListener("resize", syncViewport);
        window.visualViewport?.addEventListener("scroll", syncViewport);

        syncViewport();
        syncState();
      })();
    </script>
  </body>
</html>
