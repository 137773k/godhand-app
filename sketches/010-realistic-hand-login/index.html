<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Realistic Hand Login Reference</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #040506;
        --gold: #f5d79d;
        --gold-strong: #e6ad54;
        --text: #f8f3ea;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 14%, rgba(255, 209, 132, 0.11), transparent 22%),
          radial-gradient(circle at 18% 20%, rgba(103, 125, 255, 0.08), transparent 18%),
          radial-gradient(circle at 82% 28%, rgba(255, 171, 73, 0.09), transparent 16%),
          radial-gradient(circle at 50% 88%, rgba(255, 176, 80, 0.08), transparent 24%),
          linear-gradient(180deg, #070809 0%, #030405 100%);
        font-family: Inter, "SF Pro Display", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        padding: 18px;
        color: var(--text);
        position: relative;
      }

      body::before {
        content: "";
        position: fixed;
        inset: -24%;
        background:
          radial-gradient(circle at 50% 44%, rgba(255, 205, 118, 0.12), transparent 18%),
          radial-gradient(circle at 18% 18%, rgba(107, 128, 255, 0.08), transparent 16%),
          radial-gradient(circle at 84% 70%, rgba(255, 170, 72, 0.06), transparent 18%),
          radial-gradient(circle at 50% 50%, transparent 54%, rgba(0, 0, 0, 0.28) 100%);
        filter: blur(24px);
        opacity: 0.95;
        pointer-events: none;
        z-index: 0;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background:
          linear-gradient(120deg, transparent 0 39%, rgba(255, 255, 255, 0.045) 39.3% 41%, transparent 41.4% 62%, rgba(255, 255, 255, 0.028) 62.3% 63.7%, transparent 64%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.016), transparent 24%, transparent 78%, rgba(255, 255, 255, 0.012));
        mix-blend-mode: screen;
        opacity: 0.46;
        pointer-events: none;
        z-index: 0;
      }

      .frame {
        width: min(100%, 430px);
        aspect-ratio: 9 / 19;
        position: relative;
        z-index: 1;
        overflow: hidden;
        border-radius: 38px;
        background:
          radial-gradient(circle at 50% 14%, rgba(255, 214, 138, 0.18), transparent 20%),
          radial-gradient(circle at 50% 42%, rgba(255, 255, 255, 0.055), transparent 28%),
          radial-gradient(circle at 16% 24%, rgba(101, 126, 255, 0.12), transparent 18%),
          radial-gradient(circle at 84% 24%, rgba(255, 186, 86, 0.11), transparent 17%),
          radial-gradient(circle at 50% 82%, rgba(255, 179, 82, 0.16), transparent 30%),
          linear-gradient(180deg, #060709 0%, #030405 100%);
        border: 1px solid rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(10px) saturate(1.15);
        box-shadow:
          0 34px 90px rgba(0, 0, 0, 0.68),
          inset 0 1px 0 rgba(255, 255, 255, 0.03);
      }

      .frame::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 50% 32%, rgba(255, 232, 182, 0.1), transparent 22%),
          radial-gradient(circle at 50% 72%, rgba(255, 174, 76, 0.08), transparent 26%),
          linear-gradient(122deg, transparent 0 38%, rgba(255, 255, 255, 0.07) 38.4% 40.4%, transparent 40.7% 59%, rgba(255, 255, 255, 0.04) 59.3% 61.1%, transparent 61.4%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 28%, transparent 74%, rgba(255, 255, 255, 0.025));
        opacity: 0.92;
        filter: blur(0.2px);
      }

      .frame::after {
        content: "";
        position: absolute;
        inset: -12% -12% -8%;
        background:
          radial-gradient(circle at 48% 36%, rgba(255, 232, 174, 0.08), transparent 18%),
          radial-gradient(circle at 50% 80%, rgba(255, 168, 72, 0.11), transparent 28%),
          radial-gradient(circle at 12% 88%, rgba(112, 128, 255, 0.06), transparent 18%),
          linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.08) 68%, rgba(0, 0, 0, 0.36) 100%);
        pointer-events: none;
        mix-blend-mode: screen;
      }

      .liquid-core {
        position: absolute;
        left: 50%;
        top: 15%;
        width: 132%;
        height: 70%;
        transform: translateX(-50%);
        border-radius: 50%;
        background:
          radial-gradient(circle at 50% 28%, rgba(255, 255, 255, 0.09), transparent 22%),
          radial-gradient(circle at 50% 22%, rgba(255, 219, 149, 0.17), transparent 28%),
          radial-gradient(circle at 30% 34%, rgba(111, 132, 255, 0.09), transparent 18%),
          radial-gradient(circle at 72% 30%, rgba(255, 181, 79, 0.11), transparent 18%),
          linear-gradient(145deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.015) 35%, rgba(255, 255, 255, 0.05) 65%, rgba(255, 255, 255, 0.012));
        border: 1px solid rgba(255, 234, 196, 0.08);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.05),
          inset 0 -16px 32px rgba(0, 0, 0, 0.12),
          0 0 46px rgba(255, 206, 121, 0.08);
        backdrop-filter: blur(30px) saturate(1.35);
        filter: blur(1.5px);
        opacity: 0.68;
        pointer-events: none;
        mix-blend-mode: screen;
      }

      .liquid-sheen {
        position: absolute;
        left: -8%;
        top: 2%;
        width: 118%;
        height: 48%;
        transform: rotate(-10deg);
        background:
          linear-gradient(106deg, transparent 0 34%, rgba(255, 255, 255, 0.03) 34.4% 36.2%, rgba(255, 255, 255, 0.08) 36.6% 39.1%, transparent 39.3% 61%, rgba(255, 255, 255, 0.04) 61.3% 63%, transparent 63.2%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.012));
        filter: blur(0.8px);
        opacity: 0.58;
        pointer-events: none;
        mix-blend-mode: screen;
      }

      .floor-glow {
        position: absolute;
        left: 50%;
        bottom: -2%;
        width: 88%;
        height: 30%;
        transform: translateX(-50%);
        background:
          radial-gradient(circle at 50% 40%, rgba(255, 185, 84, 0.22), transparent 26%),
          radial-gradient(circle at 50% 52%, rgba(255, 227, 187, 0.08), transparent 36%),
          radial-gradient(circle at 50% 100%, rgba(255, 177, 72, 0.08), transparent 40%);
        filter: blur(26px);
        opacity: 0.8;
        pointer-events: none;
        mix-blend-mode: screen;
      }

      .dust {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 18% 16%, rgba(255, 229, 166, 0.2) 0 1px, transparent 1.6px),
          radial-gradient(circle at 75% 22%, rgba(255, 238, 205, 0.15) 0 1px, transparent 1.6px),
          radial-gradient(circle at 60% 60%, rgba(255, 205, 111, 0.12) 0 1px, transparent 1.6px),
          radial-gradient(circle at 28% 72%, rgba(255, 232, 176, 0.12) 0 1px, transparent 1.6px),
          radial-gradient(circle at 82% 55%, rgba(126, 111, 255, 0.08) 0 1px, transparent 1.6px);
        opacity: 0.84;
        pointer-events: none;
      }

      .haze {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 50% 20%, rgba(255, 220, 148, 0.12), transparent 26%),
          radial-gradient(circle at 20% 82%, rgba(255, 170, 70, 0.08), transparent 24%),
          radial-gradient(circle at 80% 76%, rgba(84, 108, 255, 0.07), transparent 22%),
          radial-gradient(circle at 50% 58%, rgba(255, 247, 235, 0.04), transparent 20%);
        filter: blur(12px);
        opacity: 0.9;
        pointer-events: none;
      }

      .glass-ribbon {
        position: absolute;
        left: 50%;
        top: 20%;
        width: 140%;
        height: 26%;
        transform: translateX(-50%) rotate(-14deg);
        background:
          linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.02) 18%, rgba(255, 255, 255, 0.08) 33%, rgba(255, 255, 255, 0.03) 49%, rgba(255, 255, 255, 0.07) 62%, transparent 78%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.01));
        backdrop-filter: blur(18px);
        opacity: 0.5;
        filter: blur(0.4px);
        pointer-events: none;
      }

      .glass-orb {
        position: absolute;
        border-radius: 50%;
        background:
          radial-gradient(circle at 35% 28%, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.04) 34%, rgba(255, 255, 255, 0.01) 66%, transparent 70%),
          linear-gradient(135deg, rgba(255, 220, 145, 0.08), rgba(255, 255, 255, 0.02));
        backdrop-filter: blur(18px);
        border: 1px solid rgba(255, 236, 188, 0.08);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.03),
          0 0 32px rgba(255, 202, 116, 0.08);
        pointer-events: none;
      }

      .orb-a {
        left: 8%;
        top: 18%;
        width: 28%;
        height: 18%;
        transform: rotate(-12deg);
        opacity: 0.55;
      }

      .orb-b {
        right: -2%;
        top: 26%;
        width: 22%;
        height: 14%;
        transform: rotate(18deg);
        opacity: 0.42;
      }

      .orb-c {
        left: 56%;
        top: 60%;
        width: 32%;
        height: 20%;
        transform: rotate(8deg);
        opacity: 0.36;
      }

      .title-wrap {
        position: absolute;
        left: 8%;
        right: 8%;
        top: 7.8%;
        z-index: 6;
      }

      .eyebrow {
        margin: 0 0 10px;
        font-size: 0.72rem;
        letter-spacing: 0.34em;
        color: rgba(255, 239, 207, 0.64);
        text-transform: uppercase;
      }

      .title {
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        font-family: "Arial Black", Inter, sans-serif;
        font-size: clamp(2.6rem, 8.4vw, 4rem);
        line-height: 0.88;
        letter-spacing: 0.01em;
        font-weight: 900;
        color: #f9f5ef;
        text-shadow:
          0 0 10px rgba(255, 205, 114, 0.1),
          0 2px 0 rgba(0, 0, 0, 0.58),
          0 18px 30px rgba(0, 0, 0, 0.52);
      }

      .title span {
        display: block;
      }

      .title strong {
        color: #f2ca77;
      }

      .subtitle {
        margin: 12px 0 0;
        max-width: 24ch;
        color: rgba(248, 244, 237, 0.72);
        font-size: 0.94rem;
        line-height: 1.58;
      }

      .ui {
        position: absolute;
        left: 50%;
        top: 54%;
        width: min(82%, 340px);
        transform: translateX(-50%);
        z-index: 7;
      }

      .field {
        border-radius: 16px;
        border: 1px solid rgba(255, 220, 140, 0.18);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.025)),
          rgba(10, 12, 16, 0.72);
        backdrop-filter: blur(18px) saturate(1.2);
        padding: 16px 18px 18px;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.06),
          0 16px 34px rgba(0, 0, 0, 0.22);
      }

      .placeholder {
        text-align: center;
        color: rgba(248, 244, 237, 0.84);
        font-size: 0.96rem;
        margin-bottom: 12px;
      }

      .line {
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(255, 188, 69, 0.92), transparent);
        box-shadow: 0 0 14px rgba(255, 188, 69, 0.42);
      }

      .button {
        width: 100%;
        margin-top: 14px;
        border: 1px solid rgba(255, 223, 156, 0.22);
        border-radius: 999px;
        padding: 16px 20px;
        background:
          linear-gradient(135deg, rgba(255, 211, 118, 0.98), rgba(255, 168, 64, 0.95) 52%, rgba(179, 96, 16, 0.94));
        color: #fff9ef;
        font-size: 0.98rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        box-shadow:
          0 0 0 1px rgba(255, 238, 190, 0.2),
          0 18px 34px rgba(168, 92, 17, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.24);
      }

      .hint {
        position: absolute;
        left: 50%;
        bottom: 4.8%;
        transform: translateX(-50%);
        z-index: 6;
        color: rgba(255, 222, 142, 0.74);
        font-size: 0.7rem;
        letter-spacing: 0.28em;
        white-space: nowrap;
      }

      @media (max-width: 480px) {
        body {
          padding: 10px;
        }
      }
    </style>
  </head>
  <body>
      <main class="frame" aria-label="Realistic hand login reference">
        <div class="dust"></div>
        <div class="haze"></div>
        <div class="glass-ribbon"></div>
        <div class="glass-orb orb-a"></div>
        <div class="glass-orb orb-b"></div>
        <div class="glass-orb orb-c"></div>
        <div class="liquid-core"></div>
        <div class="liquid-sheen"></div>
        <div class="floor-glow"></div>
        <section class="title-wrap">
          <p class="eyebrow">sacred strength</p>
          <div style="position:relative; display:inline-block;">
            <h1 class="title">
              <span>HAND</span>
            <span class="gold">OF GOD</span>
          </h1>
        </div>
        <p class="subtitle">把未来拖到掌心里，克制到只剩下力量和光。</p>
      </section>

      <section class="ui">
        <div class="field">
          <div class="placeholder">手机号登录</div>
          <div class="line"></div>
        </div>
        <button class="button" type="button">开始塑造</button>
      </section>

      <div class="hint">ONE HAND / ONE LIGHT</div>
    </main>
  </body>
</html>
