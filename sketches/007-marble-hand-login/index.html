<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marble God Hand Login Reference</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050505;
        --gold: #f3d49a;
        --gold-strong: #d6a04a;
        --text: #f7f2ea;
        --muted: rgba(247, 242, 234, 0.68);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 30%, rgba(214, 160, 74, 0.12), transparent 28%),
          radial-gradient(circle at 52% 88%, rgba(255, 221, 148, 0.15), transparent 34%),
          linear-gradient(180deg, #060606, #020202);
        font-family: Inter, "SF Pro Display", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        padding: 18px;
        color: var(--text);
      }

      .frame {
        width: min(100%, 430px);
        aspect-ratio: 9 / 19;
        position: relative;
        overflow: hidden;
        border-radius: 38px;
        background:
          radial-gradient(circle at 50% 14%, rgba(255, 231, 179, 0.08), transparent 30%),
          linear-gradient(180deg, #030303 0%, #050505 100%);
        border: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow:
          0 32px 90px rgba(0, 0, 0, 0.62),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }

      .frame::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(135deg, transparent 0 40%, rgba(255, 255, 255, 0.03) 40.3% 41.8%, transparent 42.1%),
          linear-gradient(135deg, transparent 58%, rgba(255, 255, 255, 0.025) 58.3% 60%, transparent 60.2%);
        opacity: 0.55;
      }

      .dust {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(circle at 20% 18%, rgba(255, 231, 179, 0.28) 0 1px, transparent 1.6px),
          radial-gradient(circle at 32% 24%, rgba(255, 247, 225, 0.18) 0 1px, transparent 1.6px),
          radial-gradient(circle at 71% 15%, rgba(255, 231, 179, 0.26) 0 1px, transparent 1.6px),
          radial-gradient(circle at 81% 32%, rgba(255, 241, 208, 0.18) 0 1px, transparent 1.6px),
          radial-gradient(circle at 58% 58%, rgba(255, 219, 136, 0.12) 0 1px, transparent 1.6px),
          radial-gradient(circle at 18% 72%, rgba(255, 231, 179, 0.1) 0 1px, transparent 1.6px);
        opacity: 0.9;
      }

      .title-wrap {
        position: absolute;
        left: 8%;
        right: 8%;
        top: 8%;
        z-index: 5;
      }

      .eyebrow {
        margin: 0 0 10px;
        letter-spacing: 0.34em;
        font-size: 0.7rem;
        color: rgba(255, 238, 203, 0.62);
        text-transform: uppercase;
      }

      .title {
        margin: 0;
        font-family: "Arial Black", Inter, sans-serif;
        font-size: clamp(3rem, 10vw, 4.9rem);
        line-height: 0.92;
        letter-spacing: 0.02em;
        color: #fffaf1;
        text-shadow:
          0 0 12px rgba(255, 230, 176, 0.12),
          0 2px 0 rgba(0, 0, 0, 0.56),
          0 16px 32px rgba(0, 0, 0, 0.55);
      }

      .title strong {
        color: var(--gold);
      }

      .subtitle {
        margin: 14px 0 0;
        max-width: 23ch;
        color: rgba(247, 242, 234, 0.72);
        font-size: 0.95rem;
        line-height: 1.6;
      }

      .orbits {
        position: absolute;
        inset: 0;
        z-index: 3;
        pointer-events: none;
      }

      .orbit {
        position: absolute;
        border-radius: 50%;
        border: 1px solid rgba(255, 226, 170, 0.4);
        box-shadow: 0 0 18px rgba(255, 217, 129, 0.18);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01));
        backdrop-filter: blur(5px);
      }

      .orbit.a {
        width: 98px;
        height: 98px;
        left: 52%;
        top: 26%;
        transform: translateX(-50%);
      }

      .orbit.b {
        width: 58px;
        height: 58px;
        left: 64%;
        top: 23%;
        opacity: 0.9;
      }

      .orbit.c {
        width: 70px;
        height: 70px;
        left: 24%;
        top: 38%;
        clip-path: polygon(50% 0%, 85% 15%, 100% 50%, 85% 85%, 50% 100%, 15% 85%, 0% 50%, 15% 15%);
      }

      .spark {
        position: absolute;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: rgba(255, 226, 170, 0.9);
        box-shadow: 0 0 14px rgba(255, 226, 170, 0.8);
      }

      .spark.s1 { left: 57%; top: 22%; }
      .spark.s2 { left: 78%; top: 34%; }
      .spark.s3 { left: 19%; top: 49%; }

      .hand-wrap {
        position: absolute;
        left: 50%;
        bottom: -2%;
        width: 94%;
        height: 58%;
        transform: translateX(-50%);
        z-index: 2;
      }

      .glow {
        position: absolute;
        left: 50%;
        bottom: 17%;
        width: 76%;
        height: 48%;
        transform: translateX(-50%);
        border-radius: 50%;
        background: radial-gradient(circle at center, rgba(255, 235, 184, 0.9), rgba(255, 205, 112, 0.42) 18%, rgba(255, 174, 66, 0.1) 40%, transparent 68%);
        filter: blur(24px);
        opacity: 0.84;
      }

      .hand {
        position: absolute;
        left: 50%;
        bottom: 6%;
        width: 68%;
        height: 82%;
        transform: translateX(-50%);
      }

      .palm {
        position: absolute;
        left: 50%;
        bottom: 0;
        width: 56%;
        height: 42%;
        transform: translateX(-50%);
        border-radius: 42% 42% 34% 34%;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.78) 0%, rgba(247, 244, 238, 0.84) 22%, rgba(224, 218, 209, 0.96) 48%, rgba(188, 182, 171, 0.96) 72%, rgba(126, 118, 108, 1) 100%);
        box-shadow:
          inset 0 18px 34px rgba(255, 255, 255, 0.34),
          inset 0 -24px 38px rgba(49, 45, 43, 0.34),
          0 0 0 1px rgba(255, 230, 188, 0.18);
      }

      .palm::before {
        content: "";
        position: absolute;
        inset: 12% 14% 16%;
        border-radius: inherit;
        background:
          radial-gradient(circle at 50% 34%, rgba(255, 248, 237, 0.92), rgba(229, 224, 218, 0.78) 28%, rgba(194, 188, 180, 0.6) 58%, rgba(161, 154, 146, 0.32) 82%, transparent 100%);
        mix-blend-mode: screen;
        opacity: 0.9;
      }

      .vein {
        position: absolute;
        inset: 20% 10% 16%;
        background:
          linear-gradient(112deg, transparent 34%, rgba(220, 186, 100, 0.24) 35.2%, rgba(220, 186, 100, 0.02) 40%, transparent 41%),
          linear-gradient(78deg, transparent 54%, rgba(220, 186, 100, 0.18) 55.4%, rgba(220, 186, 100, 0.02) 60%, transparent 61%),
          linear-gradient(28deg, transparent 24%, rgba(220, 186, 100, 0.17) 25.2%, rgba(220, 186, 100, 0.02) 30%, transparent 31%);
        mix-blend-mode: multiply;
        opacity: 0.58;
      }

      .finger {
        position: absolute;
        bottom: 32%;
        width: 10.8%;
        border-radius: 999px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(242, 238, 232, 0.94) 22%, rgba(214, 209, 201, 0.96) 52%, rgba(156, 149, 141, 0.98) 100%);
        box-shadow:
          inset 0 10px 16px rgba(255, 255, 255, 0.28),
          inset 0 -16px 20px rgba(73, 68, 66, 0.24);
      }

      .finger::after {
        content: "";
        position: absolute;
        inset: 9% 20%;
        border-radius: inherit;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.56), transparent 72%);
      }

      .f1 { left: 20%; height: 34%; transform: rotate(-18deg); }
      .f2 { left: 32%; height: 38%; transform: rotate(-8deg); }
      .f3 { left: 45%; height: 40%; transform: rotate(1deg); }
      .f4 { left: 58%; height: 36%; transform: rotate(10deg); }
      .f5 { left: 70%; height: 32%; transform: rotate(18deg); }

      .thumb {
        position: absolute;
        left: 14%;
        bottom: 22%;
        width: 13%;
        height: 24%;
        border-radius: 999px;
        transform: rotate(-44deg);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.86), rgba(237, 233, 227, 0.95) 24%, rgba(199, 193, 186, 0.96) 62%, rgba(122, 115, 107, 1) 100%);
        box-shadow:
          inset 0 10px 16px rgba(255, 255, 255, 0.26),
          inset 0 -16px 18px rgba(73, 68, 66, 0.28);
      }

      .wrist {
        position: absolute;
        left: 31%;
        bottom: -1%;
        width: 38%;
        height: 16%;
        border-radius: 28px;
        background:
          linear-gradient(180deg, rgba(238, 234, 228, 0.96), rgba(184, 177, 169, 0.98) 40%, rgba(101, 96, 88, 1) 100%);
        box-shadow:
          inset 0 12px 18px rgba(255, 255, 255, 0.2),
          inset 0 -14px 16px rgba(60, 55, 52, 0.28);
      }

      .veil {
        position: absolute;
        left: 50%;
        bottom: 14%;
        width: 72%;
        height: 44%;
        transform: translateX(-50%);
        background: radial-gradient(circle at center, rgba(255, 233, 180, 0.42), rgba(255, 198, 104, 0.12) 38%, transparent 72%);
        filter: blur(18px);
        z-index: 1;
      }

      .ui {
        position: absolute;
        left: 50%;
        top: 52%;
        width: min(84%, 340px);
        transform: translateX(-50%);
        z-index: 5;
      }

      .input-title {
        margin: 0 0 12px;
        text-align: center;
        color: rgba(247, 242, 234, 0.54);
        font-size: 0.74rem;
        letter-spacing: 0.28em;
        text-transform: uppercase;
      }

      .field {
        position: relative;
        padding: 16px 18px 18px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 225, 160, 0.08);
        backdrop-filter: blur(10px);
      }

      .field::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }

      .placeholder {
        margin: 0 auto 12px;
        text-align: center;
        color: rgba(255, 248, 237, 0.82);
        font-size: 0.96rem;
      }

      .line {
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(247, 210, 132, 0.92), transparent);
        box-shadow: 0 0 18px rgba(247, 210, 132, 0.48);
      }

      .button {
        margin-top: 14px;
        width: 100%;
        border: 0;
        border-radius: 999px;
        padding: 16px 20px;
        background:
          linear-gradient(135deg, rgba(255, 234, 183, 0.95), rgba(220, 171, 82, 0.95) 42%, rgba(239, 186, 120, 0.92) 74%, rgba(198, 129, 82, 0.92));
        color: #fffaf3;
        font-size: 0.98rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        box-shadow:
          0 0 0 1px rgba(255, 240, 204, 0.22),
          0 18px 34px rgba(183, 117, 38, 0.26),
          inset 0 1px 0 rgba(255, 255, 255, 0.34);
      }

      .hint {
        position: absolute;
        left: 50%;
        bottom: 4.8%;
        transform: translateX(-50%);
        z-index: 5;
        color: rgba(255, 226, 171, 0.74);
        letter-spacing: 0.24em;
        font-size: 0.7rem;
        white-space: nowrap;
      }

      @media (max-width: 480px) {
        body {
          padding: 10px;
        }
      }
    </style>
  </head>
  <body>
    <main class="frame" aria-label="Marble login reference">
      <div class="dust"></div>
      <div class="title-wrap">
        <p class="eyebrow">minimal luxury login</p>
        <h1 class="title">上帝之<strong>手</strong></h1>
        <p class="subtitle">极简奢华、永恒静谧、带一点纪念碑式的神圣感。</p>
      </div>

      <div class="orbits" aria-hidden="true">
        <div class="orbit a"></div>
        <div class="orbit b"></div>
        <div class="orbit c"></div>
        <div class="spark s1"></div>
        <div class="spark s2"></div>
        <div class="spark s3"></div>
      </div>

      <section class="hand-wrap" aria-hidden="true">
        <div class="glow"></div>
        <div class="veil"></div>
        <div class="hand">
          <div class="palm"></div>
          <div class="vein"></div>
          <div class="finger f1"></div>
          <div class="finger f2"></div>
          <div class="finger f3"></div>
          <div class="finger f4"></div>
          <div class="finger f5"></div>
          <div class="thumb"></div>
          <div class="wrist"></div>
        </div>
      </section>

      <section class="ui">
        <div class="input-title">email access</div>
        <div class="field">
          <div class="placeholder">邮箱</div>
          <div class="line"></div>
        </div>
        <button class="button" type="button">进入</button>
      </section>

      <div class="hint">SACRED SILENCE</div>
    </main>
  </body>
</html>
